name: my_first_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # حزم اللغات والوقت
  intl: ^0.20.2
  timeago: ^3.7.1

  # قاعدة البيانات والتحقق والحماية
  supabase_flutter: ^2.14.2
  flutter_dotenv: ^5.1.0 

  # حزمة إعلانات Start.io الصحيحة والمتاحة
  startapp_sdk: ^0.1.3 # 🟢 تم التعديل هنا لضمان قبول التحميل من pub.dev

  # الوسائط والملفات
  image_picker: ^1.2.2
  video_player: ^2.9.2
  cached_video_player_plus: ^4.1.0

  # مشاركة الروابط والتحكم في التطبيق
  share_plus: ^13.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  # تفعيل قراءة ملف المفاتيح السرية داخل التطبيق
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png.png"
  adaptive_icon_background: "#121214"
  adaptive_icon_foreground: "assets/app_icon.png.png"