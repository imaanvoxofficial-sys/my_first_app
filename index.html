<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق ImaanVox الرسمي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            text-align: center;
            padding: 60px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #1c1c1f;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #2196F3; margin-bottom: 20px; }
        p { font-size: 18px; color: #b3b3b3; line-height: 1.6; margin-bottom: 30px; }
        .download-btn {
            display: inline-block;
            background-color: #2196F3;
            color: #ffffff;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        .download-btn:hover {
            background-color: #1976D2;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ImaanVox</h1>
        <p>مرحباً بك في المنصة الرسمية لتطبيق إيمان فوكس. يمكنك الآن تحميل النسخة الأحدث مباشرة على هاتفك والاستمتاع بجميع المزايا.</p>
        
        <!-- هذا هو الرابط الصحيح من جوجل درايف -->
        <a href="https://drive.google.com/file/d/1MXysSHUJAZweUeb7Sl11gdi1NJlVpk61/view?usp=sharing" class="download-btn">
            📥 تحميل التطبيق الآن
        </a>
    </div>

</body>
</html>
